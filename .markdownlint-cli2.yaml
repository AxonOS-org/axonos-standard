config:
  default: true
  MD013: false   # line length — normative prose has long sentences
  MD025: false   # multiple H1 — Part headings are intentionally top-level
  MD033: false   # inline HTML
  MD036: false   # emphasis as heading — house style for status/normative-marker lines
  MD037: false   # spaces inside emphasis
  MD041: false
  MD024: false   # repeated sub-headings across parts
  MD026: false
  MD012: false
  MD022: false
  MD031: false
  MD032: false
  MD040: false
  MD034: false
  MD029: false
  MD059: false   # descriptive link text — cosmetic (markdownlint v0.38+)
  MD060: false   # table column / pipe spacing — cosmetic (markdownlint v0.40+)
ignores:
  - ".github/**"
  - "LICENSE"
