name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  standard-contract:
    name: standard contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify AxonOS Standard contract
        run: python3 tools/verify_standard_contract.py

  canonical-artifacts:
    name: canonical artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify canonical draft artifacts
        run: python3 tools/verify_standard_artifacts.py

  normative-chapters:
    name: normative chapters
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify expanded normative chapters
        run: python3 tools/verify_normative_chapters.py
