# SPDX-License-Identifier: Apache-2.0 OR MIT
# Guards the documentation against placeholder / template tokens. Part of the
# AxonOS integrity discipline: no scaffolding in the published record.
name: integrity
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
permissions: { contents: read }
jobs:
  no-placeholders:
    name: No placeholder / template tokens in docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: python tools/check_integrity.py .
